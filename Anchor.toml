[toolchain]
anchor_version = "0.31.1"
solana_version = "2.1.0"

[features]
resolution = true
skip-lint = false

[programs.mainnet]
# NOTE: Running anchor keys sync updates this ID, which is not
#       correct as this needs to track the Jupiter mainnet program ID
jupiter = "JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4"
transfer_hook = "Gk7syLzEbk46Ez6Fr9pApPPhTJMDavKxiN9JHAtfhZCz"
vaults = "8mkCdpBLeEEiGTu3y5rRyAWMfjBEw3Qm8SNQmMXNhG5f"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "./deploy/deployer.json"

[scripts]
test = "yarn test:vaults"
test-vaults = "(anchor localnet > /dev/null &) && sleep 2 && (yarn test:vaults; pkill solana-test-validator)"
test-transferHook = "(anchor localnet > /dev/null &) && sleep 2 && (yarn test:transferHook; pkill solana-test-validator)"
